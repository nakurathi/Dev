apiVersion: v1
kind: ConfigMap
metadata:
  name: gcp-springboot-config
  namespace: default
  labels:
    app: gcp-springboot
data:
  # ── GCP Core ─────────────────────────────────────────────────────────────
  GCP_PROJECT_ID:       "your-gcp-project-id"       # override via GitHub Secret
  GCP_REGION:           "us-central1"

  # ── Cloud Spanner ─────────────────────────────────────────────────────────
  SPANNER_INSTANCE_ID:  "my-instance"
  SPANNER_DATABASE:     "my-database"

  # ── GCS ───────────────────────────────────────────────────────────────────
  GCS_BUCKET_NAME:      "my-gcs-bucket"

  # ── Pub/Sub topics & subscriptions ────────────────────────────────────────
  PUBSUB_TOPIC_ORDERS:         "orders-topic"
  PUBSUB_TOPIC_NOTIFICATIONS:  "notifications-topic"
  PUBSUB_SUB_ORDERS:           "orders-subscription"
  PUBSUB_SUB_NOTIFICATIONS:    "notifications-subscription"

  # ── Server ────────────────────────────────────────────────────────────────
  SERVER_PORT: "8080"
  SPRING_PROFILES_ACTIVE: "prod"
