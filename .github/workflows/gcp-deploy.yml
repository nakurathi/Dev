name: Build & Deploy to GCP

on:
  push:
    branches: [ main ]
    paths:
      - 'gcp-springboot/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'gcp-springboot/**'
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  PROJECT_ID:       ${{ secrets.GCP_PROJECT_ID }}
  REGION:           ${{ secrets.GCP_REGION }}            # e.g. us-central1
  GKE_CLUSTER:      ${{ secrets.GKE_CLUSTER_NAME }}
  IMAGE:            gcr.io/${{ secrets.GCP_PROJECT_ID }}/gcp-springboot
  SPANNER_INSTANCE: ${{ secrets.SPANNER_INSTANCE_ID }}
  SPANNER_DATABASE: ${{ secrets.SPANNER_DATABASE }}
  GCS_BUCKET:       ${{ secrets.GCS_BUCKET_NAME }}

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build & Test
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: gcp-springboot
        run: mvn test --no-transfer-progress

      - name: Build JAR (skip tests — already ran)
        working-directory: gcp-springboot
        run: mvn package -DskipTests --no-transfer-progress

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: gcp-springboot/target/*.jar
          retention-days: 3

  # ─────────────────────────────────────────────
  # JOB 2: Docker Build & Push to GCR
  # ─────────────────────────────────────────────
  docker-push:
    name: Docker Build & Push to GCR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: gcp-springboot/target/

      - name: Build Docker image
        working-directory: gcp-springboot
        run: |
          docker build \
            --tag "$IMAGE:${{ github.sha }}" \
            --tag "$IMAGE:latest" \
            .

      - name: Push Docker image to GCR
        run: |
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

  # ─────────────────────────────────────────────
  # JOB 3: Deploy to GKE
  # ─────────────────────────────────────────────
  deploy-to-gke:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location:     ${{ env.REGION }}

      - name: Substitute image tag in manifests
        working-directory: gcp-springboot/k8s
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE:${{ github.sha }}|g" deployment.yml

      - name: Apply Kubernetes manifests
        working-directory: gcp-springboot/k8s
        run: |
          kubectl apply -f configmap.yml
          kubectl apply -f deployment.yml
          kubectl apply -f service.yml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/gcp-springboot \
            --timeout=120s

      - name: Print service endpoint
        run: |
          kubectl get service gcp-springboot-svc \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
